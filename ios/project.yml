name: Reelseek
options:
  bundleIdPrefix: com.khaledsamir
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: "52GK9NV362"
    CODE_SIGN_STYLE: Automatic
targets:
  Reelseek:
    type: application
    platform: iOS
    sources:
      - path: Reelseek
    resources:
      - path: Reelseek/Resources
    info:
      path: Reelseek/Info.plist
      properties:
        CFBundleDisplayName: ReelSeek
        # Version driven by build settings so fastlane can stamp a fresh build
        # number (CURRENT_PROJECT_VERSION) per upload without editing this file.
        # XcodeGen regenerates Info.plist from these properties on every build.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # App uses only standard HTTPS/TLS — exempt from export compliance.
        # Declaring it stops App Store Connect from asking on every upload.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        APIBaseURL: $(API_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khaledsamir.reelseek
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        API_BASE_URL: "https://reelseek.co"
      configs:
        Debug:
          API_BASE_URL: "https://reelseek.co"
        Release:
          API_BASE_URL: "https://reelseek.co"

# A *shared* scheme is required for headless `xcodebuild archive` / fastlane
# gym. XcodeGen only writes one into xcshareddata when it is declared here;
# otherwise Xcode creates a per-user scheme that CI can't see.
schemes:
  Reelseek:
    build:
      targets:
        Reelseek: all
    run:
      config: Debug
    archive:
      config: Release
