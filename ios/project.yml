name: Reelseek
options:
  bundleIdPrefix: com.khaledsamir
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_TEAM: ""
targets:
  Reelseek:
    type: application
    platform: iOS
    sources:
      - path: Reelseek
    resources:
      - path: Reelseek/Resources
    info:
      path: Reelseek/Info.plist
      properties:
        CFBundleDisplayName: Reelseek
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        APIBaseURL: $(API_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.khaledsamir.reelseek
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        API_BASE_URL: "https://movie-streaming-150176375922.europe-west1.run.app"
      configs:
        Debug:
          API_BASE_URL: "https://movie-streaming-150176375922.europe-west1.run.app"
        Release:
          API_BASE_URL: "https://movie-streaming-150176375922.europe-west1.run.app"
