name: Release

# Manual, on-demand store releases via fastlane. Pick a platform and a lane
# from the Actions tab ("Run workflow"). Nothing deploys on push — the
# android.yml / ios.yml workflows already cover build-on-PR; this one uploads to
# the stores and is deliberately manual.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Which platform to release
        type: choice
        options: [android, ios, both]
        default: both
      lane:
        description: "Lane: beta (test track) or release (store)"
        type: choice
        options: [beta, release]
        default: beta

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.platform }}
  cancel-in-progress: false

env:
  RUBY_VERSION: "3.3.11"
  FASTLANE_VERSION: "2.226.0"
  FASTLANE_SKIP_UPDATE_CHECK: "1"
  FASTLANE_OPT_OUT_USAGE: "1"

jobs:
  android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Ensures cmdline-tools + licenses so Gradle can fetch SDK platform 36.
      - uses: android-actions/setup-android@v3

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - run: gem install fastlane -v "$FASTLANE_VERSION" --no-document

      # Upload keystore + the gitignored keystore.properties that
      # app/build.gradle.kts reads. storeFile is absolute to avoid any
      # relative-path ambiguity. Reuses the same secrets as android.yml.
      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 --decode > "$GITHUB_WORKSPACE/android/upload-keystore.jks"
          cat > "$GITHUB_WORKSPACE/android/keystore.properties" <<EOF
          storeFile=$GITHUB_WORKSPACE/android/upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Restore Play service-account key
        run: echo "${{ secrets.PLAY_JSON_KEY_B64 }}" | base64 --decode > "$GITHUB_WORKSPACE/android/fastlane/play-service-account.json"

      - name: Fastlane ${{ github.event.inputs.lane }}
        working-directory: android
        env:
          PLAY_JSON_KEY_PATH: ${{ github.workspace }}/android/fastlane/play-service-account.json
        run: fastlane ${{ github.event.inputs.lane }}

  ios:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Pin a known-good Xcode. Bump as the project's SDK requirements change.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - run: brew install xcodegen

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}

      - run: gem install fastlane -v "$FASTLANE_VERSION" --no-document

      - name: Restore App Store Connect API key
        run: |
          mkdir -p "$GITHUB_WORKSPACE/ios/fastlane"
          echo "${{ secrets.ASC_KEY_B64 }}" | base64 --decode > "$GITHUB_WORKSPACE/ios/fastlane/AuthKey.p8"

      - name: Fastlane ${{ github.event.inputs.lane }}
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ github.workspace }}/ios/fastlane/AuthKey.p8
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # match — installs the distribution cert/profile on the CI keychain.
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: fastlane ${{ github.event.inputs.lane }}
