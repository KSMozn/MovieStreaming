name: Android

on:
  pull_request:
    paths: ["android/**"]
  push:
    branches: [main]
    paths: ["android/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Lint, test, and build debug APK
        working-directory: android
        run: ./gradlew lint testDebugUnitTest assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: reelseek-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # Signed release bundle on android-v* tags. Requires repo secrets:
  # KEYSTORE_B64 (base64 of upload-keystore.jks), KEYSTORE_PASSWORD,
  # KEY_ALIAS, KEY_PASSWORD. Upload to Play Console stays manual.
  release:
    if: startsWith(github.ref, 'refs/tags/android-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        working-directory: android
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > upload-keystore.jks
          cat > keystore.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build signed release bundle
        working-directory: android
        run: ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: reelseek-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
