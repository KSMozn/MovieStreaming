name: Web

on:
  pull_request:
    paths-ignore: ["android/**", "ios/**", "docs/**"]
  push:
    branches: [main]
    paths-ignore: ["android/**", "ios/**", "docs/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build
